<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Square Background -->
  <rect width="180" height="180" rx="40" fill="#0a0a0a"/>
  
  <!-- Subtle Border -->
  <rect x="2" y="2" width="176" height="176" rx="38" stroke="#ffffff" stroke-opacity="0.1" stroke-width="4"/>
  
  <!-- Terminal Prompt Icon -->
  <path d="M50 60L85 90L50 120" stroke="#22c55e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Underscore Cursor -->
  <rect x="95" y="110" width="35" height="10" rx="2" fill="#22c55e">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" />
  </rect>
</svg>
